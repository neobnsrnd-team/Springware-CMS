# sonar-project.properties
# SonarCloud 정적 분석 설정 — TypeScript/Next.js 프로젝트 (Issue #295)

# ── 프로젝트 식별 ──────────────────────────────────────────────────────────
sonar.projectKey=springware-cms
sonar.projectName=Springware CMS
sonar.projectVersion=0.1.0

# ── 소스 설정 ──────────────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=e2e

# 분석 제외 경로
sonar.exclusions=\
    **/node_modules/**,\
    **/.next/**,\
    **/out/**,\
    **/build/**,\
    **/public/**,\
    **/next-env.d.ts,\
    **/data/**,\
    **/migrations/**

# 테스트 제외 경로 (소스 분석에서)
sonar.test.exclusions=**/e2e/**

# ── 언어 설정 ──────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# TypeScript tsconfig 경로
sonar.typescript.tsconfigPath=tsconfig.json

# ── 커버리지 리포트 ────────────────────────────────────────────────────────
# Playwright coverage (v8) 결과 경로
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── ESLint 리포트 연동 ────────────────────────────────────────────────────
# CI에서 `eslint --format json -o eslint-report.json` 으로 생성
sonar.eslint.reportPaths=eslint-report.json
