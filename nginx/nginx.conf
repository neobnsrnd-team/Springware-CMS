# nginx/nginx.conf
# ──────────────────────────────────────────────────────────────────────────────
# CMS 관리자(3000) + 운영 배포(3001) 리버스 프록시 + 이미지 정적 서빙
# 도메인 확보 후 server_name을 실제 도메인으로 교체하세요.
# ──────────────────────────────────────────────────────────────────────────────

# ── port 80: CMS 관리자 (:3000) ───────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # CMS 관리자 컨테이너 — basePath '/cms' 기준
    location /cms {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 결재 전 이미지 정적 서빙 (:3000 에디터용)
    location /static/ {
        alias /data/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # 승인된 이미지 서빙
    location /deployed/static/ {
        alias /data/deployed/img/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }
}

# ── port 8080: 현업 제작자 (:3001) ───────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    client_max_body_size 100m;

    # 배포된 HTML 파일 직접 서빙 — /cms 보다 먼저 매칭되어야 함
    # Next.js를 거치지 않고 /data/deployed/ 에서 즉시 읽음 (재기동 불필요)
    location /cms/deployed/ {
        alias /data/deployed/;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
    }

    # 운영 배포 컨테이너 — basePath '/cms' 기준 (port 80과 경로 동일, 포트로 구분)
    location /cms {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 결재 전 이미지 서빙 (:3001에 /data/uploads 읽기 전용 마운트됨)
    location /static/ {
        alias /data/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # 승인된 이미지 서빙
    location /deployed/static/ {
        alias /data/deployed/img/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }
}
