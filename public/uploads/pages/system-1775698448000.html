                    </a></div>
                <div data-banner-item="" data-banner-idx="1" style="flex-shrink:0;width:100%;"><a href="#" style="display:block;position:relative;text-decoration:none;">
                        <div style="width: 100%; aspect-ratio: 16 / 9; background: rgb(229, 231, 235);" class="flex justify-center items-center"><span style="color:#9CA3AF;font-size:14px;">이미지를 추가하세요</span></div>
                        <div data-banner-overlay="" style="position:absolute;bottom:0;left:0;right:0;padding:16px;background:linear-gradient(to top,rgba(0,0,0,0.55) 0%,transparent 100%);">
                            <p data-banner-overlay-title="" style="margin:0 0 4px;font-size:16px;font-weight:700;color:#fff;">두 번째 배너</p>
                        </div>
                    </a></div>
                <div data-banner-item="" data-banner-idx="2" style="flex-shrink:0;width:100%;"><a href="#" style="display:block;position:relative;text-decoration:none;">
                        <div style="width: 100%; aspect-ratio: 16 / 9; background: rgb(229, 231, 235);" class="flex justify-center items-center"><span style="color:#9CA3AF;font-size:14px;">이미지를 추가하세요</span></div>
                    </a></div>
            </div>
            <div data-banner-pagination="" style="gap: 8px; padding: 8px 0px;" class="flex justify-center items-center"><button data-banner-prev="" style="background:none;border:none;cursor:pointer;padding:4px 8px;font-size:14px;color:#6B7280;">❮</button><span data-banner-indicator="" style="font-size: 13px; color: rgb(107, 114, 128); min-width: 40px;" class="text-center">1 / 3</span><button data-banner-next="" style="background:none;border:none;cursor:pointer;padding:4px 8px;font-size:14px;color:#6B7280;">❯</button><button data-banner-pause="" style="background:none;border:none;cursor:pointer;padding:4px 8px;font-size:16px;color:#6B7280;">❙❙</button></div>
            <script>
                (function() {
                    var root = document.currentScript && document.currentScript.closest('[data-spw-block]');
                    if (!root || root.getAttribute('data-banner-inited') === '1') return;
                    if (root.closest('.is-builder')) return;
                    root.setAttribute('data-banner-inited', '1');
                    var track = root.querySelector('[data-banner-track]');
                    if (!track) return;
                    track.style.cssText = 'display:flex;flex-direction:row;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;';
                    var styleId = 'eb-hide-' + Math.random().toString(36).slice(2, 8);
                    track.setAttribute('data-eb-id', styleId);
                    var styleEl = document.createElement('style');
                    styleEl.textContent = '[data-eb-id="' + styleId + '"]::-webkit-scrollbar{display:none}';
                    root.appendChild(styleEl);
                    var items = track.querySelectorAll('[data-banner-item]');
                    items.forEach(function(item) {
                        item.style.flex = '0 0 100%';
                        item.style.scrollSnapAlign = 'start';
                    });
                    var total = items.length;
                    var current = 0;
                    var indicator = root.querySelector('[data-banner-indicator]');
                    var prevBtn = root.querySelector('[data-banner-prev]');
                    var nextBtn = root.querySelector('[data-banner-next]');
                    var pauseBtn = root.querySelector('[data-banner-pause]');
                    var interval = parseInt(root.getAttribute('data-banner-interval') || '3000', 10);
                    var timer = null;
                    var paused = false;

                    function goTo(idx) {
                        current = (idx % total + total) % total;
                        track.scrollTo({
                            left: track.offsetWidth * current,
                            behavior: 'smooth'
                        });
                        if (indicator) indicator.textContent = (current + 1) + ' / ' + total;
                    }

                    function startTimer() {
                        if (paused) return;
                        timer = setInterval(function() {
                            goTo(current + 1);
                        }, interval);
                    }

                    function stopTimer() {
                        clearInterval(timer);
                        timer = null;
                    }
                    startTimer();
                    if (prevBtn) prevBtn.addEventListener('click', function() {
                        stopTimer();
                        goTo(current - 1);
                        startTimer();
                    });
                    if (nextBtn) nextBtn.addEventListener('click', function() {
                        stopTimer();
                        goTo(current + 1);
                        startTimer();
                    });
                    if (pauseBtn) pauseBtn.addEventListener('click', function() {
                        paused = !paused;
                        if (paused) {
                            stopTimer();
                            pauseBtn.innerHTML = '&#9654;';
                        } else {
                            pauseBtn.innerHTML = '&#10073;&#10073;';
                            startTimer();
                        }
                    });
                    root.addEventListener('mouseover', function() {
                        stopTimer();
                    });
                    root.addEventListener('mouseleave', function() {
                        if (!paused) startTimer();
                    });
                })();
            </script>
        </div>
    </div>
</div>
