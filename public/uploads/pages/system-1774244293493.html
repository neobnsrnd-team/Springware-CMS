<div class="row">
    <div class="column">

        <div data-cb-type="app-header" style="--ah-accent: #0046A4; border-bottom-color: rgb(0, 70, 164);">
            <div class="ah-inner">
                <a href="#" class="ah-logo">
                    <img class="ah-logo-img" src="" alt="은행 로고">
                    <span class="ah-logo-text">IBK기업은행</span>
                </a>
            </div>
        </div>

    </div>
</div>
<div class="row">
    <div class="column">

        <div data-cb-type="product-gallery" style="--pg-accent: rgba(0, 140, 106, 1);" data-cb-autoplay="true" data-cb-autoplay-delay="4000" data-cb-show-dots="true" data-cb-accent-color="rgba(0, 140, 106, 1)">
            <div class="pg-header">
                <h3 class="pg-title">주요 금융상품</h3>
            </div>
            <div class="pg-track">
                <div class="pg-slide" data-type="savings">
                    <div class="pg-type-badge">적금</div>

                    <div class="pg-rate-wrap"><span class="pg-rate-value">4.5</span><span class="pg-rate-unit">%</span></div>

                <div class="pg-slide" data-type="deposit">

                    <div class="pg-detail">한도 최대 10억 · 거치 최대 3년</div>
                    <a href="#" class="pg-cta">자세히 보기</a>
                </div>
            </div>
            <div class="pg-dots"></div>
        </div>

    </div>
