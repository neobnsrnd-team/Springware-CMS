<div class="row">
    <div class="column">

        <div data-cb-type="app-header" style="--ah-accent: #0046A4; border-bottom-color: rgb(0, 70, 164);">
            <div class="ah-inner">
                <a href="#" class="ah-logo">
                    <img class="ah-logo-img" src="" alt="은행 로고">
                    <span class="ah-logo-text">IBK기업은행</span>
                </a>
            </div>
        </div>

    </div>
</div>
<div class="row">
    <div class="column">

        <div data-cb-type="auth-center" class="responsive-layout" style="--ac-accent: #0046A4;">
            <style>
                [data-cb-type="auth-center"].responsive-layout .ac-cards {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                    gap: 12px;
                }
            </style>
            <div class="ac-header">
                <h3 class="ac-title">인증센터</h3>
                <p class="ac-desc">안전한 금융거래를 위한 인증 서비스</p>
            </div>
            <div class="ac-cards">
                <a href="#" class="ac-card" data-type="cert">
                    <div class="ac-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg></div>
                    <div class="ac-card-content"><span class="ac-card-title">공동인증서</span><span class="ac-card-desc">발급 · 갱신 · 복사</span></div>
                    <svg class="ac-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <path d="m9 18 6-6-6-6"></path>
                    </svg>
                </a>
                <a href="#" class="ac-card" data-type="finance-cert">
                    <div class="ac-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg></div>
                    <div class="ac-card-content"><span class="ac-card-title">금융인증서</span><span class="ac-card-desc">클라우드 기반 인증</span></div>
                    <svg class="ac-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <path d="m9 18 6-6-6-6"></path>
                    </svg>
                </a>
                <a href="#" class="ac-card" data-type="otp">
                    <div class="ac-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="5" y="2" width="14" height="20" rx="2"></rect>
                            <line x1="12" y1="18" x2="12.01" y2="18"></line>
                            <path d="M9 7h6"></path>
                            <path d="M9 11h6"></path>
                        </svg></div>
                    <div class="ac-card-content"><span class="ac-card-title">OTP</span><span class="ac-card-desc">일회용 비밀번호 생성기</span></div>
                    <svg class="ac-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <path d="m9 18 6-6-6-6"></path>
                    </svg>
                </a>
                <a href="#" class="ac-card" data-type="security-card">
                    <div class="ac-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path>
                        </svg></div>
                    <div class="ac-card-content"><span class="ac-card-title">보안카드</span><span class="ac-card-desc">보안카드 분실 · 재발급</span></div>
                    <svg class="ac-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <path d="m9 18 6-6-6-6"></path>
                    </svg>
                </a>
            </div>
            <div class="ac-notice">
                <svg class="ac-notice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path>
                </svg>
                <p class="ac-notice-text">금융기관은 절대 개인정보, 보안카드 번호 전체를 요구하지 않습니다.</p>
            </div>
        </div>

    </div>
</div>
