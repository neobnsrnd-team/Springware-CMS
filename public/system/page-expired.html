<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지 만료</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f8faff;
            color: #374151;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1A1A2E;
            margin-bottom: 8px;
        }
        p {
            font-size: 14px;
            color: #6B7280;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⏰</div>
        <h1>이 페이지는 만료되었습니다</h1>
        <p>서비스 기간이 종료되어 더 이상 열람할 수 없습니다.<br>문의사항은 관리자에게 연락해주세요.</p>
    </div>
</body>
</html>
