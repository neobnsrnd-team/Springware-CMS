<svg xmlns="http://www.w3.org/2000/svg" width="260" height="180" viewBox="0 0 260 180">
  <!-- 배경 -->
  <rect width="260" height="180" fill="#F5F7FA" rx="8"/>

  <!-- 페이지 콘텐츠 영역 (흐림 처리) -->
  <rect x="20" y="16" width="220" height="12" fill="#E5E7EB" rx="4"/>
  <rect x="20" y="36" width="180" height="8" fill="#E5E7EB" rx="4"/>
  <rect x="20" y="52" width="200" height="8" fill="#E5E7EB" rx="4"/>
  <rect x="20" y="68" width="160" height="8" fill="#E5E7EB" rx="4"/>
  <rect x="20" y="84" width="190" height="8" fill="#E5E7EB" rx="4"/>
  <rect x="20" y="100" width="170" height="8" fill="#E5E7EB" rx="4"/>

  <!-- 플로팅 바 배경 -->
  <rect x="0" y="136" width="260" height="44" fill="#ffffff" rx="0"/>
  <!-- 상단 그림자 효과 -->
  <rect x="0" y="134" width="260" height="3" fill="url(#shadowGrad)"/>

  <!-- 강조 문구 -->
  <text x="16" y="163" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#1A1A2E">최대 연 5.0% 금리 혜택</text>

  <!-- 신청하기 버튼 -->
  <rect x="178" y="148" width="66" height="24" fill="#0046A4" rx="6"/>
  <text x="211" y="164" font-family="-apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">신청하기</text>

  <!-- 그라디언트 정의 -->
  <defs>
    <linearGradient id="shadowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,70,164,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,70,164,0)"/>
    </linearGradient>
  </defs>
</svg>
