<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#F5F7FA" rx="12"/>

  <!-- Map area -->
  <rect x="0" y="0" width="300" height="118" fill="#D1E3F8" rx="12"/>
  <rect x="0" y="106" width="300" height="12" fill="#D1E3F8"/>

  <!-- Map grid lines -->
  <line x1="0" y1="30" x2="300" y2="30" stroke="#BDD4F0" stroke-width="0.5"/>
  <line x1="0" y1="60" x2="300" y2="60" stroke="#BDD4F0" stroke-width="0.5"/>
  <line x1="0" y1="90" x2="300" y2="90" stroke="#BDD4F0" stroke-width="0.5"/>
  <line x1="75" y1="0" x2="75" y2="118" stroke="#BDD4F0" stroke-width="0.5"/>
  <line x1="150" y1="0" x2="150" y2="118" stroke="#BDD4F0" stroke-width="0.5"/>
  <line x1="225" y1="0" x2="225" y2="118" stroke="#BDD4F0" stroke-width="0.5"/>

  <!-- Map markers -->
  <circle cx="120" cy="65" r="10" fill="#0046A4"/>
  <text x="120" y="70" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="700">영</text>
  <circle cx="120" cy="65" r="14" fill="#0046A4" fill-opacity="0.2"/>

  <circle cx="200" cy="45" r="8" fill="#FF6600"/>
  <text x="200" y="49" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="800">ATM</text>

  <!-- Search bar -->
  <rect x="12" y="8" width="216" height="30" fill="white" rx="10"/>
  <text x="26" y="27" font-family="sans-serif" font-size="10" fill="#9CA3AF">지역 또는 지점명 검색</text>
  <rect x="234" y="8" width="30" height="30" fill="#0046A4" rx="10"/>
  <text x="249" y="27" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle">🔍</text>

  <!-- Filter chips -->
  <rect x="12" y="86" width="36" height="20" fill="#0046A4" rx="10"/>
  <text x="30" y="99" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="600">전체</text>
  <rect x="54" y="86" width="44" height="20" fill="white" rx="10"/>
  <text x="76" y="99" font-family="sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">영업점</text>
  <rect x="104" y="86" width="36" height="20" fill="white" rx="10"/>
  <text x="122" y="99" font-family="sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">ATM</text>

  <!-- Bottom sheet handle -->
  <rect x="125" y="112" width="50" height="4" fill="#D1D5DB" rx="2"/>

  <!-- Branch list -->
  <rect x="0" y="118" width="300" height="82" fill="white"/>
  <!-- Item 1 -->
  <rect x="14" y="126" width="34" height="34" fill="#0046A4" rx="10"/>
  <text x="31" y="147" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="700">영</text>
  <text x="58" y="139" font-family="sans-serif" font-size="11" fill="#1A1A2E" font-weight="600">IBK 강남지점</text>
  <text x="58" y="152" font-family="sans-serif" font-size="9" fill="#6B7280">서울 강남구 테헤란로 123</text>
  <rect x="258" y="128" width="30" height="30" fill="#E8F0FC" rx="10"/>
  <text x="273" y="147" font-family="sans-serif" font-size="13" text-anchor="middle">📞</text>
  <line x1="12" y1="164" x2="288" y2="164" stroke="#F3F4F6" stroke-width="1"/>

  <!-- Item 2 -->
  <rect x="14" y="170" width="34" height="22" fill="#FF6600" rx="7"/>
  <text x="31" y="185" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="800">ATM</text>
  <text x="58" y="181" font-family="sans-serif" font-size="10" fill="#1A1A2E" font-weight="600">IBK ATM (강남역 2번출구)</text>
  <text x="58" y="193" font-family="sans-serif" font-size="8" fill="#9CA3AF">24시간 운영</text>
</svg>
