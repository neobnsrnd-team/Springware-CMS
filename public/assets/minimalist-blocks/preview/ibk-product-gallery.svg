<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#F5F7FA" rx="12"/>
  <!-- Card -->
  <rect x="14" y="14" width="200" height="172" fill="white" rx="14"/>
  <!-- Decorative corner -->
  <path d="M154 14 Q214 14 214 74 L214 14 Z" fill="#E8F0FC"/>
  <!-- Badge -->
  <rect x="26" y="28" width="30" height="16" fill="#E8F0FC" rx="8"/>
  <text x="41" y="40" font-family="sans-serif" font-size="9" fill="#0046A4" text-anchor="middle" font-weight="700">적금</text>
  <!-- Product name -->
  <text x="26" y="68" font-family="sans-serif" font-size="13" fill="#1A1A2E" font-weight="700">IBK D-Day 적금</text>
  <!-- Rate -->
  <text x="26" y="112" font-family="sans-serif" font-size="44" fill="#0046A4" font-weight="800">4.5</text>
  <text x="96" y="112" font-family="sans-serif" font-size="22" fill="#0046A4" font-weight="700">%</text>
  <!-- Rate label -->
  <text x="26" y="128" font-family="sans-serif" font-size="10" fill="#6B7280">최고 금리 (연)</text>
  <!-- Detail -->
  <line x1="26" y1="140" x2="200" y2="140" stroke="#F3F4F6" stroke-width="1"/>
  <text x="26" y="156" font-family="sans-serif" font-size="10" fill="#6B7280">기간 1~36개월 · 월 최대 100만원</text>
  <!-- CTA -->
  <rect x="26" y="164" width="174" height="14" fill="#0046A4" rx="7"/>
  <text x="113" y="174" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="600">자세히 보기</text>
  <!-- Peek of next card -->
  <rect x="220" y="14" width="68" height="172" fill="white" rx="14" opacity="0.5"/>
  <text x="254" y="90" font-family="sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle">예금</text>
  <!-- Dots -->
  <circle cx="95" cy="192" r="5" fill="#0046A4"/>
  <circle cx="107" cy="192" r="3" fill="#D1D5DB"/>
  <circle cx="116" cy="192" r="3" fill="#D1D5DB"/>
</svg>
