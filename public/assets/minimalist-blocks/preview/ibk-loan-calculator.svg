<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="white" rx="12"/>

  <!-- Tabs -->
  <rect x="0" y="0" width="300" height="38" fill="#F5F7FA" rx="12"/>
  <rect x="0" y="20" width="300" height="18" fill="#F5F7FA"/>
  <!-- Active tab -->
  <rect x="6" y="5" width="88" height="28" fill="white" rx="8"/>
  <text x="50" y="23" font-family="sans-serif" font-size="12" fill="#0046A4" text-anchor="middle" font-weight="700">대출</text>
  <!-- Inactive tabs -->
  <text x="148" y="23" font-family="sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">예금</text>
  <text x="244" y="23" font-family="sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">적금</text>

  <!-- Field 1 - 대출금액 -->
  <text x="18" y="54" font-family="sans-serif" font-size="10" fill="#374151" font-weight="600">대출금액</text>
  <rect x="14" y="58" width="272" height="30" fill="#F5F7FA" rx="10"/>
  <text x="28" y="78" font-family="sans-serif" font-size="16" fill="#1A1A2E" font-weight="700">10,000</text>
  <text x="256" y="78" font-family="sans-serif" font-size="11" fill="#9CA3AF">만원</text>
  <!-- Range slider -->
  <rect x="14" y="92" width="272" height="4" fill="#E5E7EB" rx="2"/>
  <rect x="14" y="92" width="100" height="4" fill="#0046A4" rx="2"/>
  <circle cx="114" cy="94" r="9" fill="#0046A4"/>

  <!-- Field 2 - 금리 -->
  <text x="18" y="116" font-family="sans-serif" font-size="10" fill="#374151" font-weight="600">금리 (연)</text>
  <rect x="14" y="120" width="272" height="30" fill="#F5F7FA" rx="10"/>
  <text x="28" y="140" font-family="sans-serif" font-size="16" fill="#1A1A2E" font-weight="700">5.0</text>
  <text x="256" y="140" font-family="sans-serif" font-size="11" fill="#9CA3AF">%</text>
  <!-- Range slider -->
  <rect x="14" y="154" width="272" height="4" fill="#E5E7EB" rx="2"/>
  <rect x="14" y="154" width="52" height="4" fill="#0046A4" rx="2"/>
  <circle cx="66" cy="156" r="9" fill="#0046A4"/>

  <!-- Result box -->
  <rect x="14" y="166" width="272" height="28" fill="#E8F0FC" rx="10"/>
  <text x="26" y="184" font-family="sans-serif" font-size="10" fill="#6B7280">월 납입금</text>
  <text x="230" y="184" font-family="sans-serif" font-size="13" fill="#0046A4" font-weight="800" text-anchor="middle">237,974원</text>
</svg>
